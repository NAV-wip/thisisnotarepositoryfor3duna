<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DUNA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--s1:#131313;--s2:#1a1a1a;--s3:#222;
  --b1:#252525;--b2:#2e2e2e;--b3:#3a3a3a;
  --t1:#eeece6;--t2:#999;--t3:#555;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--teal:#2dd4bf;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;
}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:52px 1fr;min-height:100vh}
.rail{background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;position:sticky;top:0;height:100vh}
.rail-logo{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--t2);writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--b1);width:100%;text-align:center}
.rail-btn{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:16px;transition:all 0.15s;border:none;background:none;position:relative}
.rail-btn:hover{color:var(--t1);background:var(--s2)}
.rail-btn.active{color:var(--t1);background:var(--s3)}
.rail-btn .tip{position:absolute;left:44px;background:var(--s3);border:1px solid var(--b2);border-radius:6px;padding:4px 8px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:50}
.rail-btn:hover .tip{opacity:1}
.rail-foot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3)}
.sync-dot.ok{background:var(--green)}
.sync-dot.busy{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.main{display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{padding:0 20px;height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.page-title{font-size:14px;font-weight:500;color:var(--t2)}
.spacer{flex:1}
.btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-family:var(--font);transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--b1)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-accent{background:var(--t1);color:#0c0c0c;border-color:var(--t1)}
.btn-accent:hover{background:#d0cec8}
.btn-green{background:rgba(74,222,128,.12);color:var(--green);border-color:rgba(74,222,128,.25)}
.btn-green:hover{background:rgba(74,222,128,.2)}
.content{flex:1;overflow-y:auto;padding:20px}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}

/* ── FEED ── */
.feed-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--b2);background:none;color:var(--t2);font-family:var(--font);transition:all .15s}
.pill:hover{color:var(--t1);border-color:var(--b3)}
.pill.on{background:var(--s2);color:var(--t1);border-color:var(--b3)}
.srch{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:6px 10px;color:var(--t1);font-family:var(--font);font-size:12px;width:200px}
.srch::placeholder{color:var(--t3)}
.srch:focus{outline:none;border-color:var(--b3)}

.tx-group{margin-bottom:20px}
.tx-group-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:8px;font-weight:500}
.tx-row{display:grid;grid-template-columns:16px 1fr auto auto 90px 80px;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);border:1px solid transparent;transition:all .15s;cursor:default}
.tx-row:hover{background:var(--s1);border-color:var(--b1)}
.tx-indicator{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tx-main{}
.tx-concepto{font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.tx-meta{font-size:11px;color:var(--t3);margin-top:1px}
.tx-entidad{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:var(--s2);color:var(--t2);flex-shrink:0}
.tx-cat{font-size:10px;color:var(--t3);flex-shrink:0;text-align:right;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-valor{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right;flex-shrink:0}
.tx-estado{display:flex;justify-content:flex-end;flex-shrink:0}
.estado-btn{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;white-space:nowrap}
.estado-btn.pendiente{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.estado-btn.pendiente:hover{background:rgba(251,191,36,.2)}
.estado-btn.pagado{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.15)}
.estado-btn.pagado:hover{background:rgba(74,222,128,.15)}
.del-btn{opacity:0;background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:all .15s}
.tx-row:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red);background:rgba(248,113,113,.1)}

/* ── BALANCES ── */
.bal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:24px}
.bal-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:18px}
.bal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bal-name{font-size:13px;font-weight:500}
.bal-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.bal-number{font-family:var(--mono);font-size:26px;font-weight:500;margin-bottom:4px}
.bal-sub{font-size:11px;color:var(--t3);margin-bottom:14px}
.bal-rows{}
.bal-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--b1);font-size:11px}
.bal-row-label{color:var(--t3)}
.bal-row-val{font-family:var(--mono);font-size:11px}

/* ── RESUMEN ── */
.summary-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.smet{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.smet-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.smet-val{font-family:var(--mono);font-size:20px;font-weight:500}
.smet-sub{font-size:10px;color:var(--t3);margin-top:3px}
.charts-grid{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:20px}
.chart-box{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px}
.chart-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:12px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r2);width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:500}
.modal-x{background:none;border:none;color:var(--t3);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;border-radius:4px}
.modal-x:hover{color:var(--t1)}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end}

/* tipo toggle */
.ttog{display:flex;border:1px solid var(--b2);border-radius:6px;overflow:hidden;margin-bottom:14px}
.ttog-btn{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;background:var(--s2);color:var(--t3);border:none;font-family:var(--font);transition:all .15s}
.ttog-btn.on-i{background:rgba(74,222,128,.15);color:var(--green)}
.ttog-btn.on-e{background:rgba(248,113,113,.15);color:var(--red)}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3)}
.fi,.fs{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:8px 10px;color:var(--t1);font-family:var(--font);font-size:12px;width:100%;transition:border-color .15s}
.fi:focus,.fs:focus{outline:none;border-color:var(--b3)}
.fs option{background:var(--s1)}

/* estado toggle */
.etog{display:flex;border:1px solid var(--b2);border-radius:6px;overflow:hidden;margin-bottom:10px}
.etog-btn{flex:1;padding:7px;text-align:center;cursor:pointer;font-size:12px;font-weight:500;background:var(--s2);color:var(--t3);border:none;font-family:var(--font);transition:all .15s}
.etog-btn.on-p{background:rgba(251,191,36,.12);color:var(--amber)}
.etog-btn.on-pg{background:rgba(74,222,128,.12);color:var(--green)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:10px 16px;font-size:12px;z-index:200;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;color:var(--t3);font-size:13px;position:fixed;inset:0;background:var(--bg);z-index:300}
.spinner{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--t1);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span id="load-msg">Conectando...</span>
</div>

<div class="shell" id="shell" style="display:none">
  <!-- Rail -->
  <aside class="rail">
    <div class="rail-logo">3DUNA</div>
    <button class="rail-btn active" id="rb-feed" onclick="gotoPage('feed',this)" title="Feed">
      ≡<span class="tip">Feed</span>
    </button>
    <button class="rail-btn" id="rb-balances" onclick="gotoPage('balances',this)" title="Balances">
      ⇅<span class="tip">Balances</span>
    </button>
    <button class="rail-btn" id="rb-resumen" onclick="gotoPage('resumen',this)" title="Resumen">
      ◎<span class="tip">Resumen</span>
    </button>
    <div class="rail-foot">
      <button class="rail-btn" onclick="syncNow()" title="Sync"><span style="font-size:13px">↻</span><span class="tip">Sincronizar</span></button>
      <button class="rail-btn" onclick="undoAction()" id="undo-rb" title="Deshacer"><span style="font-size:12px">↩</span><span class="tip">Deshacer</span></button>
      <div class="sync-dot" id="sdot" title=""></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="page-title" id="page-title">Feed</span>
      <div class="spacer"></div>
      <span id="sync-txt" style="font-size:10px;color:var(--t3)"></span>
      <button class="btn btn-accent" onclick="openModal()">+ Nuevo</button>
    </div>

    <!-- FEED -->
    <div class="content page active" id="page-feed">
      <div class="feed-filters">
        <input class="srch" type="text" placeholder="Buscar..." id="srch" oninput="renderFeed()">
        <button class="pill on" data-f="tipo" data-v="" onclick="togglePill(this)">Todos</button>
        <button class="pill" data-f="tipo" data-v="ingreso" onclick="togglePill(this)">↑ Ingresos</button>
        <button class="pill" data-f="tipo" data-v="egreso" onclick="togglePill(this)">↓ Egresos</button>
        <button class="pill on" data-f="estado" data-v="" onclick="togglePill(this)">Todos</button>
        <button class="pill" data-f="estado" data-v="pendiente" onclick="togglePill(this)">Pendiente</button>
        <button class="pill" data-f="estado" data-v="pagado" onclick="togglePill(this)">Pagado</button>
        <select class="srch" style="width:auto" id="f-ent" onchange="renderFeed()">
          <option value="">Todas las entidades</option>
          <option>nicolas</option><option>la nevera</option><option>samuel</option><option>cliente</option><option>proveedor</option>
        </select>
      </div>
      <div id="feed-content"></div>
    </div>

    <!-- BALANCES -->
    <div class="content page" id="page-balances">
      <div class="bal-grid" id="bal-grid"></div>
    </div>

    <!-- RESUMEN -->
    <div class="content page" id="page-resumen">
      <div class="summary-metrics" id="sum-metrics"></div>
      <div class="charts-grid">
        <div class="chart-box">
          <div class="chart-label">Flujo mensual</div>
          <div style="position:relative;height:200px"><canvas id="ch-mes" role="img" aria-label="Flujo mensual"></canvas></div>
        </div>
        <div class="chart-box">
          <div class="chart-label">Por categoría</div>
          <div style="position:relative;height:200px"><canvas id="ch-cat" role="img" aria-label="Por categoría"></canvas></div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-label">Balance acumulado</div>
        <div style="position:relative;height:160px"><canvas id="ch-bal" role="img" aria-label="Balance"></canvas></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Nuevo movimiento</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="ttog">
        <button class="ttog-btn on-i" id="ti" onclick="setTipo('ingreso')">↑ Ingreso</button>
        <button class="ttog-btn" id="te" onclick="setTipo('egreso')">↓ Egreso</button>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Categoría</label>
          <select class="fs" id="n-cat">
            <option>cotizacion</option><option>reabastecimiento</option><option>inversion drones</option>
            <option>inversion</option><option>mantenimiento</option><option>nomina empleados</option>
            <option>prestamo</option><option>cliente referido LN</option><option>referido 3DUNA</option>
          </select></div>
        <div class="fg"><label class="fl">Entidad</label>
          <select class="fs" id="n-ent">
            <option>nicolas</option><option>la nevera</option><option>samuel</option>
            <option>cliente</option><option>proveedor</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Concepto</label>
        <input class="fi" type="text" id="n-con" placeholder="Descripción del movimiento"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Valor (COP)</label>
          <input class="fi" type="number" id="n-val" placeholder="0"></div>
        <div class="fg"><label class="fl">IVA (COP)</label>
          <input class="fi" type="number" id="n-iva" placeholder="0"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Fecha</label>
          <input class="fi" type="date" id="n-fec"></div>
        <div class="fg"><label class="fl">Medio</label>
          <select class="fs" id="n-med">
            <option value="TRANSF">Transferencia</option>
            <option value="EFECTI">Efectivo</option>
          </select></div>
      </div>
      <div class="fg"><label class="fl">Estado</label>
        <div class="etog">
          <button class="etog-btn on-p" id="ep" onclick="setEstado('pendiente')">Pendiente</button>
          <button class="etog-btn" id="epg" onclick="setEstado('pagado')">Pagado</button>
        </div></div>
      <div class="fg"><label class="fl">Código / Referencia</label>
        <input class="fi" type="text" id="n-cod" placeholder="COT-XXXXX"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="saveTx()" id="save-btn">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BIN_ID  = '6a1f7db2da38895dfe7e709c';
const API_KEY = '$2a$10$KZ/5PuQY3f8ISTkZSbJ5gub./tyjiLmo/zJ64W04yRRGN0KaOyWtW';
const URL_BIN = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS_R = {'X-Access-Key': API_KEY};
const HEADERS_W = {'Content-Type':'application/json','X-Access-Key': API_KEY};
const SALDO_INICIAL = 815000;

let tx = [], history = [], future = [];
let newTipo = 'ingreso', newEstado = 'pendiente';
let filters = {tipo:'', estado:''};
let charts = {};
let editId = null;

// ── UTILS ──
const fmt  = n => '$' + Math.round(n).toLocaleString('es-CO');
const fmtS = n => n>=1000000 ? '$'+(n/1000000).toFixed(1)+'M' : n>=1000 ? '$'+(n/1000).toFixed(0)+'K' : fmt(n);
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const byDate = (a,b) => (b.fecha||'').localeCompare(a.fecha||'');

// ── SYNC ──
function setSyncState(s, msg) {
  const d = document.getElementById('sdot');
  d.className = 'sync-dot' + (s==='ok'?' ok':s==='busy'?' busy':s==='err'?' err':'');
  d.title = msg || '';
  document.getElementById('sync-txt').textContent = msg || '';
}

async function loadData() {
  setSyncState('busy','Cargando...');
  try {
    const r = await fetch(URL_BIN+'/latest', {headers: HEADERS_R});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    const rec = j.record;
    if(rec.transactions && rec.transactions.length) {
      tx = rec.transactions;
    } else {
      tx = getSeed();
      await saveData(true);
    }
    const t = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    setSyncState('ok', '↻ '+t);
    return true;
  } catch(e) {
    setSyncState('err','Sin conexión');
    if(!tx.length) tx = getSeed();
    return false;
  }
}

async function saveData(silent) {
  if(!silent) setSyncState('busy','Guardando...');
  try {
    const r = await fetch(URL_BIN, {method:'PUT', headers: HEADERS_W, body: JSON.stringify({transactions: tx, version:2, saldo_inicial: SALDO_INICIAL})});
    if(!r.ok) throw new Error(r.status);
    const t = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    setSyncState('ok','✓ '+t);
    return true;
  } catch(e) {
    setSyncState('err','Error al guardar');
    return false;
  }
}

async function syncNow() {
  await loadData();
  renderAll();
  showToast('✓ Sincronizado');
}

// ── HISTORY ──
function snap() {
  history.push(JSON.stringify(tx));
  if(history.length > 20) history.shift();
  future = [];
  updateUndoBtn();
}
function undoAction() {
  if(!history.length) return;
  future.push(JSON.stringify(tx));
  tx = JSON.parse(history.pop());
  renderAll(); saveData();
  showToast('↩ Deshecho'); updateUndoBtn();
}
function updateUndoBtn() {
  const b = document.getElementById('undo-rb');
  b.style.opacity = history.length ? '1' : '0.3';
}
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undoAction(); }
});

// ── FEED ──
function togglePill(el) {
  const f = el.dataset.f, v = el.dataset.v;
  document.querySelectorAll(`.pill[data-f="${f}"]`).forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  filters[f] = v;
  renderFeed();
}

function getFiltered() {
  const s = document.getElementById('srch').value.toLowerCase();
  const ent = document.getElementById('f-ent').value;
  return tx.filter(t => {
    if(filters.tipo && t.tipo !== filters.tipo) return false;
    if(filters.estado && t.estado !== filters.estado) return false;
    if(ent && t.entidad !== ent) return false;
    if(s && !(t.concepto||'').toLowerCase().includes(s) &&
            !(t.categoria||'').toLowerCase().includes(s) &&
            !(t.codigo||'').toLowerCase().includes(s)) return false;
    return true;
  });
}

function groupByMonth(list) {
  const g = {};
  const noDate = [];
  list.forEach(t => {
    if(!t.fecha) { noDate.push(t); return; }
    const m = t.fecha.slice(0,7);
    if(!g[m]) g[m] = [];
    g[m].push(t);
  });
  const sorted = Object.keys(g).sort().reverse();
  const result = sorted.map(m => ({label: fmtMonth(m), items: g[m]}));
  if(noDate.length) result.push({label:'Sin fecha', items: noDate});
  return result;
}

function fmtMonth(m) {
  const [y,mo] = m.split('-');
  return ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][+mo-1] + ' ' + y;
}

const ENTIDAD_COLORS = {
  'nicolas':   '#60a5fa',
  'la nevera': '#a78bfa',
  'samuel':    '#2dd4bf',
  'cliente':   '#4ade80',
  'proveedor': '#888',
};

function renderFeed() {
  const filtered = getFiltered().sort(byDate);
  const groups = groupByMonth(filtered);
  const el = document.getElementById('feed-content');
  if(!filtered.length) { el.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  el.innerHTML = groups.map(g => `
    <div class="tx-group">
      <div class="tx-group-label">${g.label} · ${g.items.length}</div>
      ${g.items.map(t => txRow(t)).join('')}
    </div>`).join('');
}

function txRow(t) {

  const sign  = t.tipo === 'ingreso' ? '+' : '−';

// ── BALANCES ──
function renderBalances() {
  const entidades = ['la nevera','nicolas','samuel','cliente','proveedor'];
  const cards = entidades.map(ent => {
    const entra  = tx.filter(t=>t.entidad===ent&&t.tipo==='ingreso'&&t.estado==='pagado').reduce((s,t)=>s+t.valor,0);
    const sale   = tx.filter(t=>t.entidad===ent&&t.tipo==='egreso' &&t.estado==='pagado').reduce((s,t)=>s+t.valor,0);
    const pCobrar= tx.filter(t=>t.entidad===ent&&t.tipo==='ingreso'&&t.estado==='pendiente').reduce((s,t)=>s+t.valor,0);
    const pPagar = tx.filter(t=>t.entidad===ent&&t.tipo==='egreso' &&t.estado==='pendiente').reduce((s,t)=>s+t.valor,0);
    const neto   = entra - sale;
    const color  = ENTIDAD_COLORS[ent] || '#888';
    const netColor = neto > 0 ? 'var(--green)' : neto < 0 ? 'var(--red)' : 'var(--t2)';

    const rows = [
      entra  ? `<div class="bal-row"><span class="bal-row-label">Pagado a 3DUNA</span><span class="bal-row-val" style="color:var(--green)">${fmt(entra)}</span></div>` : '',
      sale   ? `<div class="bal-row"><span class="bal-row-label">3DUNA pagó</span><span class="bal-row-val" style="color:var(--red)">${fmt(sale)}</span></div>` : '',
      pCobrar? `<div class="bal-row"><span class="bal-row-label">Por cobrar</span><span class="bal-row-val" style="color:var(--amber)">${fmt(pCobrar)}</span></div>` : '',
      pPagar ? `<div class="bal-row"><span class="bal-row-label">Por pagar</span><span class="bal-row-val" style="color:var(--amber)">${fmt(pPagar)}</span></div>` : '',
    ].filter(Boolean).join('');

    return `<div class="bal-card" style="border-color:${color}22">
      <div class="bal-header">
        <div class="bal-name" style="color:${color}">${ent}</div>
        <div class="bal-badge" style="background:${color}18;color:${color}">${tx.filter(t=>t.entidad===ent).length} movs</div>
      </div>
      <div class="bal-number" style="color:${netColor}">${fmtS(Math.abs(neto))}</div>
      <div class="bal-sub" style="color:var(--t3)">${neto>0?'3DUNA recibió más':neto<0?'3DUNA pagó más':'En equilibrio'}</div>
      ${rows}
    </div>`;
  });
  document.getElementById('bal-grid').innerHTML = cards.join('');
}

// ── RESUMEN ──
function renderResumen() {
  const inP  = tx.filter(t=>t.tipo==='ingreso'&&t.estado==='pagado').reduce((s,t)=>s+t.valor,0);
  const outP = tx.filter(t=>t.tipo==='egreso' &&t.estado==='pagado').reduce((s,t)=>s+t.valor,0);
  const saldo = SALDO_INICIAL + inP - outP;
  const cobrar= tx.filter(t=>t.tipo==='ingreso'&&t.estado==='pendiente').reduce((s,t)=>s+t.valor,0);
  const pagar = tx.filter(t=>t.tipo==='egreso' &&t.estado==='pendiente').reduce((s,t)=>s+t.valor,0);

  document.getElementById('sum-metrics').innerHTML = `
    <div class="smet"><div class="smet-label">Saldo cuenta</div><div class="smet-val" style="color:var(--blue)">${fmtS(saldo)}</div><div class="smet-sub">desde ${fmt(SALDO_INICIAL)}</div></div>
    <div class="smet"><div class="smet-label">Total ingresos</div><div class="smet-val" style="color:var(--green)">${fmtS(inP)}</div><div class="smet-sub">${tx.filter(t=>t.tipo==='ingreso').length} movs</div></div>
    <div class="smet"><div class="smet-label">Total egresos</div><div class="smet-val" style="color:var(--red)">${fmtS(outP)}</div><div class="smet-sub">${tx.filter(t=>t.tipo==='egreso').length} movs</div></div>
    <div class="smet"><div class="smet-label">Por cobrar</div><div class="smet-val" style="color:var(--amber)">${fmtS(cobrar)}</div><div class="smet-sub">pendiente ${fmt(cobrar-pagar)}</div></div>
  `;

  // Monthly chart
  const months = {};
  tx.forEach(t => {
    const m = t.fecha ? t.fecha.slice(0,7) : null; if(!m) return;
    if(!months[m]) months[m] = {in:0,out:0};
    months[m][t.tipo==='ingreso'?'in':'out'] += t.valor;
  });
  const mk = Object.keys(months).sort();
  const mlbls = mk.map(m => { const [y,mo]=m.split('-'); return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo-1]+"'"+y.slice(2); });
  if(charts.mes) charts.mes.destroy();
  charts.mes = new Chart(document.getElementById('ch-mes'), {type:'bar', data:{labels:mlbls, datasets:[
    {label:'Ingresos',data:mk.map(m=>months[m].in),backgroundColor:'rgba(74,222,128,.25)',borderColor:'#4ade80',borderWidth:1,borderRadius:3},
    {label:'Egresos', data:mk.map(m=>months[m].out),backgroundColor:'rgba(248,113,113,.25)',borderColor:'#f87171',borderWidth:1,borderRadius:3}
  ]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#555',font:{size:10},callback:v=>fmtS(v)},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}}}});

  // Category donut
  const cats = {};
  tx.forEach(t => { cats[t.categoria] = (cats[t.categoria]||0) + t.valor; });
  const ck = Object.keys(cats).sort((a,b)=>cats[b]-cats[a]).slice(0,6);
  const clrs = ['#4ade8044','#60a5fa44','#fbbf2444','#a78bfa44','#2dd4bf44','#f8717144'];
  const bclrs= ['#4ade80','#60a5fa','#fbbf24','#a78bfa','#2dd4bf','#f87171'];
  if(charts.cat) charts.cat.destroy();
  charts.cat = new Chart(document.getElementById('ch-cat'), {type:'doughnut', data:{labels:ck, datasets:[{data:ck.map(c=>cats[c]),backgroundColor:clrs,borderColor:bclrs,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'#666',font:{size:10},boxWidth:8,padding:6}}}}});

  // Balance line
  const sorted = [...tx].filter(t=>t.fecha&&t.estado==='pagado').sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let bal = SALDO_INICIAL;
  const pts = [{x:'Inicio',y:bal}];
  sorted.forEach(t => { bal += t.tipo==='ingreso'?t.valor:-t.valor; pts.push({x:t.fecha,y:bal}); });
  if(charts.bal) charts.bal.destroy();
  charts.bal = new Chart(document.getElementById('ch-bal'), {type:'line', data:{labels:pts.map(p=>p.x), datasets:[{data:pts.map(p=>p.y),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.06)',borderWidth:1.5,pointRadius:1,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555',font:{size:9},maxTicksLimit:8},grid:{display:false}},y:{ticks:{color:'#555',font:{size:9},callback:v=>fmtS(v)},grid:{color:'rgba(255,255,255,.04)'},border:{display:false}}}}});
}

async function toggleEstado(id) {
  snap();
  const t = tx.find(t=>t.id===id); if(!t) return;
  t.estado = t.estado==='pendiente'?'pagado':'pendiente';
  renderAll(); await saveData();
  showToast(t.estado==='pagado'?'✓ Marcado como pagado':'↩ Revertido a pendiente');
}

async function deleteTx(id) {
  snap();
  tx = tx.filter(t=>t.id!==id);
  renderAll(); await saveData();
  showToast('Movimiento eliminado');
}

function setTipo(t) {
  newTipo = t;
  document.getElementById('ti').className = 'ttog-btn'+(t==='ingreso'?' on-i':'');
  document.getElementById('te').className = 'ttog-btn'+(t==='egreso'?' on-e':'');
}
function setEstado(e) {
  newEstado = e;
  document.getElementById('ep').className  = 'etog-btn'+(e==='pendiente'?' on-p':'');
  document.getElementById('epg').className = 'etog-btn'+(e==='pagado'?' on-pg':'');
}
function openModal(id) {
  editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Editar movimiento' : 'Nuevo movimiento';
  if(id) {
    const t = tx.find(t=>t.id===id);
    setTipo(t.tipo); setEstado(t.estado);
    document.getElementById('n-cat').value = t.categoria;
    document.getElementById('n-ent').value = t.entidad;
    document.getElementById('n-con').value = t.concepto||'';
    document.getElementById('n-val').value = t.valor;
    document.getElementById('n-iva').value = t.iva||0;
    document.getElementById('n-fec').value = t.fecha||'';
    document.getElementById('n-med').value = t.medio||'TRANSF';
    document.getElementById('n-cod').value = t.codigo||'';
  } else {
    setTipo('ingreso'); setEstado('pendiente');
    ['n-con','n-val','n-iva','n-cod'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('n-fec').valueAsDate = new Date();
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editId=null; }

async function saveTx() {
  const val = parseFloat(document.getElementById('n-val').value)||0;
  const con = document.getElementById('n-con').value.trim();
  if(!val) { showToast('Ingresa un valor'); return; }

  snap();
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Guardando...';

  const entry = {
    id: editId || uid(),
    tipo: newTipo,
    estado: newEstado,
    categoria: document.getElementById('n-cat').value,
    entidad: document.getElementById('n-ent').value,
    concepto: con,
    valor: val,
    iva: parseFloat(document.getElementById('n-iva').value)||0,
    fecha: document.getElementById('n-fec').value,
    medio: document.getElementById('n-med').value,
    codigo: document.getElementById('n-cod').value||'',
    created_at: editId ? (tx.find(t=>t.id===editId)||{}).created_at : new Date().toISOString()
  };

  if(editId) { const i=tx.findIndex(t=>t.id===editId); if(i>-1) tx[i]=entry; }
  else tx.unshift(entry);

  closeModal();
  renderAll();
  const ok = await saveData();
  showToast(ok ? '✓ Guardado' : '⚠ Sin conexión — guardado local');
  btn.disabled=false; btn.textContent='Guardar';
}

  document.getElementById('page-title').textContent = titles[p];
  if(p==='balances') renderBalances();
  if(p==='resumen') renderResumen();
}

function renderAll() {

  if(active && active.id==='page-balances') renderBalances();
  if(active && active.id==='page-resumen') renderResumen();
}

}
